version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: jobanalyzer-postgres
    environment:
      POSTGRES_USER: ujops
      POSTGRES_PASSWORD: unful123
      POSTGRES_DB: jobanalyzer
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U <your_db_user>"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: