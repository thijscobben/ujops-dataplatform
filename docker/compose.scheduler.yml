version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: jobanalyzer-postgres
    environment:
      POSTGRES_USER: ujops
      POSTGRES_PASSWORD: change
      POSTGRES_DB: jobanalyzer
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobanalyzer_user -d jobanalyzer"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - jobanalyzer-net

  scheduler:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: jobanalyzer-scheduler
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_USER: ujops
      DB_PASSWORD: change
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: jobanalyzer
      PYTHONUNBUFFERED: 1
    volumes:
      - ../data:/app/data
      - ../scheduler_config.json:/app/scheduler_config.json:ro
    command: >
      sh -c "
        echo 'Waiting for database...' &&
        python -c 'import time; time.sleep(5)' &&
        python -m src.scheduler
      "
    restart: on-failure
    networks:
      - jobanalyzer-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:

networks:
  jobanalyzer-net:
    driver: bridge
