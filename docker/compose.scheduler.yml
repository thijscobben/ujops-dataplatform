## 1. Searching for Old Job Openings (Duration on LinkedIn)
The `hours_old=720` parameter in your current scraper already searches for jobs posted in the last 30 days. To track **how long** jobs stay on LinkedIn, you need to implement a **historical tracking system**:
### Track Job Posting Duration
Create `src/jobs/job_tracker.py`:
``` python
import logging
from datetime import datetime, timedelta
from sqlalchemy import text
from src.database import get_session

logger = logging.getLogger(__name__)


class JobTracker:
    """Track job posting duration and lifecycle"""
    
    @staticmethod
    def track_job_posting(job_data: dict):
        """
        Track when a job was first seen vs when we see it again.
        Calculate how long it's been posted.
        """
        with get_session() as session:
            # Check if job already exists
            check_sql = text("""
                SELECT id, first_seen_at FROM raw.job_listings 
                WHERE url = :url
            """)
            
            result = session.execute(check_sql, {'url': job_data.get('url')}).fetchone()
            
            if result:
                # Job already in DB - it's still active
                first_seen = result[1]
                days_posted = (datetime.utcnow() - first_seen).days
                logger.info(f"Job still active: {job_data.get('title')} ({days_posted} days posted)")
                return days_posted
            else:
                # New job - record it
                insert_sql = text("""
                    INSERT INTO raw.job_listings 
                    (title, company, location, url, description, job_board, scrape_keyword, first_seen_at)
                    VALUES (:title, :company, :location, :url, :description, :job_board, :keyword, :first_seen)
                """)
                
                session.execute(insert_sql, {
                    'title': job_data.get('title'),
                    'company': job_data.get('company'),
                    'location': job_data.get('location'),
                    'url': job_data.get('url'),
                    'description': job_data.get('description'),
                    'job_board': job_data.get('job_board'),
                    'keyword': job_data.get('search_term'),
                    'first_seen': datetime.utcnow()
                })
                session.commit()
                logger.info(f"New job tracked: {job_data.get('title')}")
                return 0
    
    @staticmethod
    def get_long_posted_jobs(days_threshold: int = 30):
        """Get jobs that have been posted for over X days"""
        with get_session() as session:
            sql = text("""
                SELECT title, company, location, url, 
                       (CURRENT_TIMESTAMP - first_seen_at) as days_posted
                FROM raw.job_listings
                WHERE first_seen_at < CURRENT_TIMESTAMP - INTERVAL '1 day' * :days
                AND last_seen_at IS NULL
                ORDER BY days_posted DESC
            """)
            
            results = session.execute(sql, {'days': days_threshold}).fetchall()
            return results
