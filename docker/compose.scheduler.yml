import logging
import requests
from bs4 import BeautifulSoup
from typing import List, Dict, Any
from .base_scraper import BaseScraper

logger = logging.getLogger(__name__)


class FreelanceNlScraper(BaseScraper):
    """Scraper for Freelance.nl Dutch job platform"""

    def __init__(self, rate_limit_config: Dict[str, Any]):
        super().__init__("freelance.nl", rate_limit_config)
        self.base_url = "https://www.freelance.nl/projects"

    def scrape(self, keyword: str, location: str = None) -> List[Dict[str, Any]]:
        """
        Scrape Freelance.nl using web scraping
        Returns job listings
        """
        try:
            # Build search URL
            params = {
                'search': keyword,
                'page': 1
            }
            
            jobs = []
            headers = {
                'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'
            }
            
            response = requests.get(self.base_url, params=params, headers=headers, timeout=10)
            response.raise_for_status()
            
            soup = BeautifulSoup(response.content, 'html.parser')
            
            # Parse job listings (adjust selectors based on actual HTML structure)
            job_elements = soup.find_all('div', class_='project-item')
            
            for job_elem in job_elements:
                try:
                    job = {
                        'title': job_elem.find('h2', class_='project-title').text.strip(),
                        'company': 'Freelance.nl Project',
                        'location': location or 'Netherlands',
                        'url': job_elem.find('a')['href'],
                        'description': job_elem.find('p', class_='project-description').text.strip(),
                        'job_board': 'freelance.nl',
                        'search_term': keyword,
                        'budget': job_elem.find('span', class_='budget')
                    }
                    jobs.append(job)
                except Exception as e:
                    logger.warning(f"Error parsing job element: {e}")
                    continue
            
            logger.info(f"Scraped {len(jobs)} jobs from Freelance.nl for '{keyword}'")
            return jobs

        except Exception as e:
            logger.error(f"Freelance.nl scrape failed for '{keyword}': {e}")
            raise
